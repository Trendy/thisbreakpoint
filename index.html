<!DOCTYPE html>
<html>
  <head>
    <title>ThisBreakpoint - By Jeremiah</title>
    <style>
      .darkmode {
        background-color: #000000;
        color: #efefef;
      }
    </style>
  </head>
  <body>
    <div style="text-align: center">
      <h1>ThisBreakpoint</h1>
    </div>
    <div style="text-align: center">
      For more information or to hire one of our people, please contact Jeremiah
      Hoyet on Twitter (<a href="https://twitter.com/_hoyet">@_hoyet</a>).
    </div>
    <div style="text-align: center">
      <button>Enable Dark Mode</button>
    </div>

    <script>
      const lightmode = () => {
        const body = document.body;
        const button = document.querySelector("button");
        button.innerText = "Enable Dark Mode";
        button.onclick = darkmode;
        body.classList.remove("darkmode");
      };

      const darkmode = () => {
        const body = document.body;
        const button = document.querySelector("button");
        button.innerText = "Disable Dark Mode";
        button.onclick = lightmode;
        body.classList.add("darkmode");
      };

      const button = document.querySelector("button");
      button.onclick = darkmode;
    </script>
  </body>
</html>
