<!DOCTYPE html>
<html>
  <head>
    <title>ThisBreakpoint</title>
    <style>
      .darkmode {
        background-color: #000000;
        color: #efefef;
      }
    </style>
    <script>
      function darkmode() {
        const body = document.body;
        body.classList.add("darkmode");
      }
    </script>
  </head>
  <body>
    <div style="text-align: center">
      <h1>ThisBreakpoint</h1>
    </div>
    <div style="text-align: center">
      For more information or to hire one of our people, please contact Jeremiah
      Hoyet on Twitter (<a href="https://twitter.com/_hoyet">@_hoyet</a>).
    </div>
    <div style="text-align: center">
      <button onclick="darkmode()">Enable Dark Mode</button>
    </div>
  </body>
</html>
